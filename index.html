<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Registrazione</title>
</head>

<body>

    <form action="/submit" method="post">
        <div class="form-row">
            <div class="field">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Nome" required>
            </div>
            <div class="field">
                <label for="cognome">Cognome:</label>
                <input type="text" id="cognome" name="cognome" placeholder="Cognome" required>
            </div>
        </div>
        <div class="form-row">
            <div class="field">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Inserisci la tua email" required>
            </div>
            <div class="field">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Inserisci la tua password" required>
            </div>
        </div>
        <div class="form-row">
            <div class="field">
                <label for="data_di_nascita">Data di nascita:</label>
                <input type="date" id="data_di_nascita" name="data_di_nascita" required>
            </div>
            <div class="field">
                <label for="numero_telefono">Numero di telefono:</label>
                <input type="tel" id="numero_telefono" name="numero_telefono"
                    placeholder="Inserisci il tuo numero di telefono" required>
            </div>
        </div>
        <fieldset>
            <legend>Musica preferita:</legend>

            <label><input type="checkbox" name="musica" value="indie"> Indie</label>
            <label><input type="checkbox" name="musica" value="rock"> Rock</label>
            <label><input type="checkbox" name="musica" value="jazz"> Jazz</label>
            <label><input type="checkbox" name="musica" value="blues"> Blues</label>
            <label><input type="checkbox" name="musica" value="cantautori"> Cantautori</label>
            <label><input type="checkbox" name="musica" value="disco"> Disco</label>
        </fieldset>

        <h3>Accetti le condizioni di privacy?</h3>

        <label>
            <input type="radio" name="condizioni" value="no" required>
            Non accetto
        </label>

        <label>
            <input type="radio" name="condizioni" value="si" required>
            Accetto
        </label>

        <button type="submit" onclick="alert('Registrazione inviata!')">Invia registrazione</button>
    </form>
    <footer>
        <p style="text-align:center; color:#666; margin-top:20px;">© 2026 Lamberto</p>
    </footer>
</body>

</html>
